apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificacoes
  namespace: notificacoes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notificacoes
  template:
    metadata:
      labels:
        app: notificacoes
    spec:
      containers:
        - name: notificacoes
          image: notificacoes:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: notificacoes-config
            - secretRef:
                name: notificacoes-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
