services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notifications
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifications"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://notifications:secret@postgres:5432/notifications?sslmode=disable
      REDIS_URL: redis://redis:6379
      WEBHOOK_SECRET: dev-webhook-secret
      CPF_HMAC_SECRET: dev-cpf-secret
      JWT_SECRET: ""
      APP_PORT: "8080"
    ports:
      - "8080:8080"
